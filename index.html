<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CONVIDADO - ASCII</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; }
    </style>
</head>
<body>
    <canvas id="ascii-canvas"></canvas>
    <script>
        const peer = new Peer();
        const canvas = document.getElementById('ascii-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const charset = "0123456789ABCDEF#!?@$";

        peer.on('open', () => {
            const conn = peer.connect('sala-p2p-ascii-total', { reliable: false });
            const img = new Image();
            conn.on('data', (data) => {
                img.onload = () => {
                    const cellSize = 9; // Tamanho das letras
                    canvas.width = img.width * cellSize;
                    canvas.height = img.height * cellSize;
                    
                    const tC = document.createElement('canvas');
                    tC.width = img.width; tC.height = img.height;
                    const tCtx = tC.getContext('2d');
                    tCtx.drawImage(img, 0, 0);
                    const pix = tCtx.getImageData(0, 0, img.width, img.height).data;

                    ctx.fillStyle = "black";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.font = "bold " + cellSize + "px monospace";

                    for (let y = 0; y < img.height; y++) {
                        for (let x = 0; x < img.width; x++) {
                            const i = (y * img.width + x) * 4;
                            const char = charset[Math.floor(Math.random() * charset.length)];
                            ctx.fillStyle = `rgb(${pix[i]},${pix[i+1]},${pix[i+2]})`;
                            ctx.fillText(char, x * cellSize, y * cellSize);
                        }
                    }
                };
                img.src = data;
            });
        });
    </script>
</body>
</html>
