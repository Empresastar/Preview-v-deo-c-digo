<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DB Server P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #000; color: #0f0; padding: 15px; margin: 0; }
        #log { border: 1px solid #0f0; height: 300px; overflow-y: auto; padding: 10px; background: #050505; border-radius: 5px; }
        .status { color: #fff; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h4 style="margin:5px 0">DB - MEMÓRIA PERMANENTE</h4>
    <div class="status" id="status">Iniciando servidor...</div>
    <div id="log">Lendo dados do disco...</div>

    <script>
        // ID Fixo para os clientes encontrarem o "servidor"
        const ID_SALA = "sala_secreta_p2p_2026_xyz";
        const peer = new Peer(ID_SALA);
        let conexoes = [];
        
        // Carrega dados salvos anteriormente no navegador
        let historicoDePosts = JSON.parse(localStorage.getItem('meu_insta_p2p')) || [];

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "Status: ONLINE (ID: " + id + ")";
            log(`Banco carregado. Posts em memória: ${historicoDePosts.length}`);
        });

        peer.on('connection', (conn) => {
            conexoes.push(conn);
            log(`Novo dispositivo conectado.`);

            // Quando conectar, envia o histórico existente para o novo cliente
            conn.on('open', () => {
                if(historicoDePosts.length > 0) {
                    conn.send({ tipo: "historico", posts: historicoDePosts });
                }
            });

            // Escuta novos posts vindo do Admin
            conn.on('data', (data) => {
                if (data.tipo === "post") {
                    historicoDePosts.push(data);
                    localStorage.setItem('meu_insta_p2p', JSON.stringify(historicoDePosts));
                    log("Novo post recebido e sincronizado.");
                    
                    // Repercute o post para todos os outros conectados
                    conexoes.forEach(c => { if(c.open) c.send(data); });
                } else if (data.tipo === "limpar") {
                    historicoDePosts = [];
                    localStorage.removeItem('meu_insta_p2p');
                    log("Banco de dados resetado.");
                    conexoes.forEach(c => { if(c.open) c.send(data); });
                }
            });
        });

        function log(m) {
            const l = document.getElementById('log');
            const agora = new Date().toLocaleTimeString();
            l.innerHTML += `<div>[${agora}] > ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }
    </script>
</body>
</html>
